<style>
body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:#0a0a0a;
  color:#f5f5f5;
}
:root{--gold:#d4af37}

/* HERO */
.hero{
  width:100%;
  height:320px;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  border-bottom:4px solid var(--gold);
}
.hero img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

/* INFO */
.info{
  text-align:center;
  padding:30px 20px;
}
.info h2{color:var(--gold)}

/* GALLERY */
.gallery{
  max-width:1100px;
  margin:30px auto;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}
.gallery img{
  width:100%;
  height:240px;
  object-fit:cover;
  border:2px solid rgba(212,175,55,.6);
}

/* MOVING IMAGES */
.moving-wrap{
  overflow:hidden;
  max-width:1100px;
  margin:40px auto;
}
.moving-track{
  display:flex;
  width:200%;
  animation:slide 12s linear infinite alternate;
}
.moving-track img{
  width:50%;
  height:260px;
  object-fit:cover;
}
@keyframes slide{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

/* FORM */
.form-box{
  max-width:750px;
  margin:50px auto;
  padding:30px;
  border:1px solid rgba(212,175,55,.5);
}
.form-box h2{color:var(--gold);text-align:center;}

label{display:block;margin-top:15px;}
input,textarea{
  width:100%;
  padding:12px;
  margin-top:6px;
  background:#0c0c0c;
  border:1px solid #333;
  color:#fff;
}

/* CHECKBOX */
.checkbox-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
.checkbox-grid label{
  background:#111;
  padding:10px;
  border:1px solid #333;
}

/* BUTTON */
button{
  margin-top:25px;
  width:100%;
  padding:16px;
  background:linear-gradient(90deg,#d4af37,#f1d27a);
  border:none;
}

/* MAP */
.map iframe{width:100%;height:350px;}

/* FLOATING */
.whatsapp,.call{
  position:fixed;
  right:18px;
  padding:14px;
  border-radius:40px;
  color:#fff;
  text-decoration:none;
}
.whatsapp{bottom:90px;background:#25d366}
.call{bottom:30px;background:#2563eb}

footer{text-align:center;padding:20px;background:#000;}
</style>
</head>

</div>

<input id="customerAddress">

<a class="call" href="tel:08060984678">Call</a>

<script>
function send(){
  let selected=[];
  document.querySelectorAll('input[type="checkbox"]:checked')
  .forEach(el=>selected.push(el.value));

  const msg=`Name:${customerName.value}
Phone:${customerPhone.value}
Products:${selected.join(", ")}
Specs:${specifications.value}
Address:${customerAddress.value}`;

  window.open("https://wa.me/2348060984678?text="+encodeURIComponent(msg));
}
</script>
